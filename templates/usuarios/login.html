{% extends 'base/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label for="email" class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control"
                            placeholder="Digite seu email"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label for="senha" class="form-label">
                            Senha
                        </label>

                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            class="form-control"
                            placeholder="Digite sua senha"
                            required
                        >

                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
