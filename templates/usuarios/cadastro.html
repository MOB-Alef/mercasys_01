{% extends 'base/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Cadastro
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100">
                        Cadastrar
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
